<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="카드비서">
  <title>카드 비서</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #242438;
      --accent: #7c6cf5;
      --text: #f0f0ff;
      --text2: #9090b0;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding-bottom: 120px;
    }

    /* Header */
    .header {
      background: var(--surface);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .month-badge { background: var(--surface2); padding: 6px 12px; border-radius: 20px; font-size: 13px; color: var(--text2); }
    .icon-btn { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 4px 6px; }

    /* Section */
    .section { padding: 16px 16px 8px; }
    .section-title { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }

    /* Category chips */
    .chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .chip {
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 4px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 11px;
      color: var(--text2);
      line-height: 1.3;
    }
    .chip .chip-emoji { display: block; font-size: 22px; margin-bottom: 3px; }
    .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Recommendation */
    .rec-wrapper { padding: 0 16px 8px; }
    .recommendation {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .rec-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .rec-card-name { font-size: 24px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
    .rec-benefit { font-size: 17px; color: var(--success); font-weight: 600; margin-bottom: 8px; }
    .rec-note { font-size: 12px; color: var(--text2); background: var(--surface2); padding: 6px 12px; border-radius: 8px; display: inline-block; }
    .rec-status { font-size: 12px; color: var(--text2); margin-top: 8px; }
    .rec-second { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 12px; color: var(--text2); }
    .rec-second strong { color: var(--warning); }
    .no-rec { color: var(--text2); font-size: 15px; text-align: center; padding: 12px 0; }

    /* Alert / warning */
    .alert-box {
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      margin-top: 6px;
      display: inline-block;
    }
    .alert-danger { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
    .alert-warning { background: rgba(251,191,36,0.1); color: var(--warning); border: 1px solid rgba(251,191,36,0.25); }
    .alert-success { background: rgba(74,222,128,0.1); color: var(--success); border: 1px solid rgba(74,222,128,0.25); }

    /* Progress bars */
    .card-progress {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .cp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cp-name { font-size: 13px; font-weight: 700; }
    .cp-amount { font-size: 11px; color: var(--text2); }
    .bar-bg { background: var(--surface2); border-radius: 8px; height: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 8px; transition: width 0.4s ease; }
    .bar-done  { background: var(--success); }
    .bar-near  { background: var(--warning); }
    .bar-low   { background: var(--accent); }
    .cp-footer { display: flex; justify-content: space-between; margin-top: 5px; }
    .cp-pct { font-size: 11px; font-weight: 700; }
    .cp-remain { font-size: 11px; color: var(--text2); }
    .cp-this-month { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .card-progress { cursor: pointer; transition: border-color 0.15s; }
    .card-progress:active { opacity: 0.85; }

    /* 전월 실적 뱃지 */
    .subsection-title { font-size: 11px; color: var(--text2); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
    .prev-perf-list { background: var(--surface); border-radius: var(--radius); padding: 6px 14px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.04); }
    .perf-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .perf-row:last-child { border-bottom: none; }
    .perf-name { font-size: 13px; font-weight: 700; }
    .perf-badge { font-size: 11px; padding: 3px 9px; border-radius: 6px; font-weight: 600; }
    .perf-ok   { background: rgba(74,222,128,0.1);  color: var(--success); }
    .perf-fail { background: rgba(248,113,113,0.1); color: var(--danger); }
    .perf-neutral { background: rgba(144,144,176,0.12); color: var(--text2); }
    .cp-chevron { font-size: 12px; color: var(--text2); transition: transform 0.2s; display: inline-block; }
    .cp-chevron.open { transform: rotate(180deg); }
    .cp-benefits { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
    .cp-benefits.open { display: block; }
    .benefit-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .benefit-row:last-child { border-bottom: none; }
    .benefit-cat { font-size: 12px; color: var(--text2); }
    .benefit-right { text-align: right; }
    .benefit-val { font-size: 12px; font-weight: 700; }
    .benefit-note { font-size: 10px; color: var(--text2); margin-top: 1px; }
    .benefit-limit { font-size: 10px; color: var(--accent); margin-top: 1px; }
    .cp-memo { font-size: 11px; color: var(--text2); margin-top: 8px; padding: 6px 10px; background: var(--surface2); border-radius: 8px; line-height: 1.5; }

    /* FAB */
    .fab {
      position: fixed; bottom: 76px; right: 20px;
      background: var(--accent); color: white;
      border: none; border-radius: 28px;
      padding: 16px 22px; font-size: 15px; font-weight: 700;
      cursor: pointer; box-shadow: 0 8px 32px rgba(124,108,245,0.45);
      z-index: 100;
    }

    /* Modal */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 24px 16px calc(env(safe-area-inset-bottom) + 32px);
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-sheet h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 11px; color: var(--text2); letter-spacing: 0.5px; margin-bottom: 6px; display: block; text-transform: uppercase; }
    .form-input {
      width: 100%; background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.08); border-radius: 12px;
      padding: 12px 14px; color: var(--text); font-size: 17px; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }

    /* Grid selectors */
    .sel-grid-cat { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .sel-grid-card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .sel-btn {
      background: var(--surface2); border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 9px 4px; color: var(--text2);
      font-size: 11px; cursor: pointer; text-align: center; transition: all 0.12s;
    }
    .sel-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,108,245,0.1); }

    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
    .btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: var(--surface2); color: var(--text2); }

    /* Settings */
    .settings-row { margin-bottom: 16px; }
    .settings-row .form-label { margin-bottom: 8px; }
    textarea.form-input { font-size: 13px; min-height: 80px; resize: vertical; font-family: monospace; }
    .danger-btn { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }

    /* Lock screen */
    .lock-screen {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 32px;
    }
    .lock-screen.active { display: flex; }
    .lock-icon { font-size: 48px; margin-bottom: 16px; }
    .lock-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .lock-sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; }
    .lock-input {
      width: 100%; max-width: 280px;
      background: var(--surface); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 14px 18px;
      color: var(--text); font-size: 22px; letter-spacing: 6px;
      text-align: center; outline: none; margin-bottom: 14px;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-btn {
      width: 100%; max-width: 280px; padding: 14px;
      background: var(--accent); color: white;
      border: none; border-radius: 14px; font-size: 16px;
      font-weight: 700; cursor: pointer;
    }
    .lock-error { font-size: 13px; color: var(--danger); margin-top: 10px; min-height: 18px; }

    /* History */
    .history-item {
      background: var(--surface2); border-radius: 10px;
      padding: 10px 12px; margin-bottom: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-item-left { font-size: 13px; }
    .history-item-right { font-size: 13px; font-weight: 600; }
    .history-empty { color: var(--text2); text-align: center; padding: 20px; font-size: 13px; }

    /* Bottom Tab Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
      display: flex; background: var(--surface); border-top: 1px solid rgba(255,255,255,0.07);
      z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 10px 0; cursor: pointer; border: none; background: none; color: var(--text2);
      font-size: 10px; font-weight: 500; transition: color 0.15s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
    .tab-panel { display: none; padding-bottom: 80px; }
    .tab-panel.active { display: block; }

    /* Ledger Calendar */
    .cal-header { display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 8px; }
    .cal-title { font-size: 16px; font-weight: 700; }
    .cal-nav { background: none; border: none; color: var(--text1); font-size: 20px;
      cursor: pointer; padding: 4px 10px; }
    .cal-summary { margin: 0 16px 12px; background: var(--surface);
      border-radius: var(--radius); padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center; }
    .cal-summary-label { font-size: 11px; color: var(--text2); }
    .cal-summary-amount { font-size: 18px; font-weight: 700; color: var(--accent); }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr);
      gap: 2px; padding: 0 10px; }
    .cal-dow { text-align: center; font-size: 10px; color: var(--text2);
      padding: 4px 0; font-weight: 600; }
    .cal-dow:first-child { color: #ff6b6b; }
    .cal-dow:last-child { color: #74b9ff; }
    .cal-day { min-height: 52px; border-radius: 8px; padding: 5px 4px;
      cursor: pointer; transition: background 0.15s; display: flex;
      flex-direction: column; align-items: center; gap: 2px; }
    .cal-day:hover { background: rgba(255,255,255,0.06); }
    .cal-day.has-txn { background: rgba(99,179,237,0.08); }
    .cal-day.selected { background: rgba(99,179,237,0.22) !important; }
    .cal-day.today .day-num { background: var(--accent); color: #000;
      border-radius: 50%; width: 20px; height: 20px; display: flex;
      align-items: center; justify-content: center; }
    .day-num { font-size: 12px; font-weight: 500; }
    .day-amt { font-size: 9px; color: var(--accent); font-weight: 600; line-height: 1.2; text-align: center; }
    .cal-detail { margin: 10px 16px 0; background: var(--surface);
      border-radius: var(--radius); padding: 12px 14px; display: none; }
    .cal-detail.open { display: block; }
    .cal-detail-title { font-size: 11px; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
    .cal-txn-row { display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
    .cal-txn-row:last-child { border-bottom: none; }
    .cal-txn-left { color: var(--text2); font-size: 11px; }
    .cal-txn-right { font-weight: 600; }
  </style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">카드 비서</div>
  <div class="lock-sub">비밀번호를 입력해주세요</div>
  <input class="lock-input" id="lockInput" type="password" inputmode="numeric"
    maxlength="10" placeholder="••••••"
    onkeydown="if(event.key==='Enter') tryUnlock()">
  <button class="lock-btn" onclick="tryUnlock()">확인</button>
  <div class="lock-error" id="lockError"></div>
</div>

<div class="header">
  <h1>💳 카드 비서</h1>
  <div class="header-right">
    <span class="month-badge" id="monthBadge"></span>
    <button class="icon-btn" onclick="openHistory()" title="거래내역">📋</button>
    <button class="icon-btn" onclick="openSettings()" title="설정">⚙️</button>
  </div>
</div>

<!-- Tab: 홈 -->
<div class="tab-panel active" id="tab-home">

  <!-- Category Chips -->
  <div class="section">
    <div class="section-title">어디서 결제하나요?</div>
    <div class="chips" id="chips"></div>
  </div>

  <!-- Recommendation -->
  <div class="rec-wrapper" id="recSection" style="display:none">
    <div class="recommendation" id="recCard"></div>
  </div>

  <!-- 실적 현황 -->
  <div class="section">
    <div class="section-title">실적 현황</div>
    <div id="progressBars"></div>
  </div>

</div>

<!-- Tab: 가계부 -->
<div class="tab-panel" id="tab-ledger">
  <div class="cal-header">
    <button class="cal-nav" onclick="calMove(-1)">‹</button>
    <div class="cal-title" id="calTitle"></div>
    <button class="cal-nav" onclick="calMove(1)">›</button>
  </div>
  <div class="cal-summary">
    <div class="cal-summary-label">이번 달 총 지출</div>
    <div class="cal-summary-amount" id="calTotal"></div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-detail" id="calDetail">
    <div class="cal-detail-title" id="calDetailTitle"></div>
    <div id="calDetailList"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">＋ 결제 기록</button>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
    <span class="nav-icon">💳</span>추천
  </button>
  <button class="nav-btn" id="nav-ledger" onclick="switchTab('ledger')">
    <span class="nav-icon">📅</span>가계부
  </button>
</nav>

<!-- ============================================================ -->
<!-- Modal: Add Transaction -->
<!-- ============================================================ -->
<div class="overlay" id="addModal">
  <div class="modal-sheet">
    <h3>💳 결제 기록</h3>
    <div class="form-group">
      <label class="form-label">금액</label>
      <input type="number" class="form-input" id="inputAmount" placeholder="예: 15000" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="sel-grid-cat" id="modalCatGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">사용 카드</label>
      <div class="sel-grid-card" id="modalCardGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('addModal')">취소</button>
      <button class="btn btn-primary" onclick="saveTransaction()">저장</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- Modal: History -->
<!-- ============================================================ -->
<div class="overlay" id="historyModal">
  <div class="modal-sheet">
    <h3>📋 이번 달 거래 내역</h3>
    <div id="historyList"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('historyModal')">닫기</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- Modal: Settings -->
<!-- ============================================================ -->
<div class="overlay" id="settingsModal">
  <div class="modal-sheet">
    <h3>⚙️ 설정</h3>

    <div class="settings-row">
      <label class="form-label">전월 실적 수동 입력</label>
      <div id="manualPerfGrid"></div>
    </div>

    <div class="divider"></div>

    <div class="settings-row">
      <label class="form-label">데이터 내보내기</label>
      <button class="btn btn-ghost" style="width:100%" onclick="exportData()">📋 클립보드 복사</button>
    </div>

    <div class="settings-row">
      <label class="form-label">데이터 가져오기 (JSON 붙여넣기)</label>
      <textarea id="importInput" class="form-input" placeholder='{"이번달사용":[...],"지난달실적":{}}'></textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="importData()">가져오기</button>
    </div>

    <div class="divider"></div>

    <div class="settings-row">
      <label class="form-label">월 초기화 (매월 1일)</label>
      <button class="btn danger-btn" style="width:100%" onclick="resetMonth()">🔄 이번달 초기화 → 지난달 실적 확정</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('settingsModal')">닫기</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// 카드 데이터 (여기를 직접 수정해서 혜택 업데이트)
// ================================================================
const CARDS = [
  {
    id: 'lotte-dept',
    name: '롯데백화점 카드',
    shortName: '롯데',
    color: '#e60012',
    실적조건: 300000,
    실적조건설명: '직전 6개월 롯데백화점 누적 30만원 이상 (일시불·할부)',
    실적제외: ['식품', '푸드코드', '식당가', '귀금속', '가전', '임대매장'],
    혜택: {
      '롯데백화점': { type: '할인', rate: 0.20, 월한도: null, 비고: 'e-쿠폰5%+청구할인15% (실적100만↑)' },
    },
    기본rate: 0,
    메모: '롯데백화점 전용 카드. 식품·식당가·귀금속·가전·임대매장 e-쿠폰 불가.'
  },
  {
    id: 'mg-better',
    name: 'MG 더나은체크',
    shortName: 'MG',
    color: '#00a651',
    실적조건: 300000,

// ================================================================
// State (localStorage)
// ================================================================
const STORAGE_KEY = 'cardBiseo_v1';

let state = {
  이번달사용: [],
  지난달실적: { 'shinhan-deepdream': 0, 'lotte-dept': 0, 'samsung-sfc7': 0, 'kb-toktok': 0, 'mg-better': 0 },
  이번달혜택사용: {},
};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ================================================================
// Core Logic
// ================================================================
function getThisMonthSpend(cardId) {
  return state.이번달사용
    .filter(t => t.cardId === cardId)
    .reduce((sum, t) => sum + t.amount, 0);
}

function isMetPerf(card) {
  if (card.실적조건 === 0) return true;
  return (state.지난달실적[card.id] || 0) >= card.실적조건;
}

function getBenefitUsed(cardId, catId) {
  return state.이번달혜택사용[`${cardId}_${catId}`] || 0;
}

function getRateScore(card, catId) {
  const b = card.혜택[catId];
  if (!b) return card.기본rate;

  if (b.type === '정액할인') {
    const used = getBenefitUsed(card.id, catId);
    return used >= (b.월한도 || 0) ? card.기본rate : 0.06;
  }

  if (b.월한도 !== null && b.월한도 !== undefined) {
    const used = getBenefitUsed(card.id, catId);
    if (used >= b.월한도) return card.기본rate;
  }

  return b.rate || card.기본rate;
}

function fmtWon(n) {
  if (!n) return '0원';
  if (n >= 10000) {
    const man = n / 10000;
    return (man % 1 === 0 ? man : man.toFixed(1)) + '만원';
  }
  return n.toLocaleString() + '원';
}

function fmtPct(r) {
  return (r * 100 % 1 === 0 ? (r * 100).toFixed(0) : (r * 100).toFixed(1)) + '%';
}

      <span class="chip-emoji">${c.emoji}</span>${c.label}
    </div>`).join('');
}

function selectCat(catId) {
  selectedCat = catId;
  renderChips();
  renderRec();
}

function renderRec() {
  const sec = document.getElementById('recSection');
  if (!selectedCat) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  const ranked = CARDS.map(card => ({
    card,
    score: getRateScore(card, selectedCat),
    metPerf: isMetPerf(card),
    hasSpecific: !!card.혜택[selectedCat],
  })).sort((a, b) => {
    // 달성+혜택 > 미달성+혜택 > 달성+기본rate > 미달성+기본rate
    const tierA = a.hasSpecific ? (a.metPerf ? 0 : 1) : (a.metPerf ? 2 : 3);
    const tierB = b.hasSpecific ? (b.metPerf ? 0 : 1) : (b.metPerf ? 2 : 3);
    if (tierA !== tierB) return tierA - tierB;
    return b.score - a.score;
  });
  const { card, score } = ranked[0];
  const second = ranked[1];

  const el = document.getElementById('recCard');
  const b = card.혜택[selectedCat];
  const metPerf = isMetPerf(card);

  // Benefit text
  let benefitText = '';
  if (score === 0) {
    benefitText = '혜택 없음';
  } else if (b) {
    if (b.type === '할인')         benefitText = `${fmtPct(b.rate)} 할인${b.비고 ? ` · ${b.비고}` : ''}`;
    else if (b.type === '적립')    benefitText = `${fmtPct(b.rate)} 적립`;
    else if (b.type === '정액할인') benefitText = `${fmtWon(b.amount)} 청구할인${b.비고 ? ` · ${b.비고}` : ''}`;
    if (!metPerf) benefitText += ' (전월실적 달성 시)';
  } else {
    benefitText = `기본 ${fmtPct(card.기본rate)} 적립`;
  }

  // Limit status
  let limitHtml = '';
  if (b && b.월한도) {
    const used = getBenefitUsed(card.id, selectedCat);
    const remain = b.월한도 - used;
    if (remain <= 0) {
      limitHtml = `<div class="alert-box alert-danger">이달 혜택 한도 소진!</div>`;
    } else {
      limitHtml = `<div class="rec-note">이달 혜택 잔여 ${fmtWon(remain)}</div>`;
    }
  }

  const perfHtml = metPerf
    ? `<span class="alert-box alert-success" style="font-size:11px">✓ 전월실적 달성</span>`
    : card.실적조건 === 0
      ? `<span class="alert-box alert-success" style="font-size:11px">실적 조건 없음</span>`
      : `<span class="alert-box alert-warning" style="font-size:11px">⚠ 전월실적 미달성 (${fmtWon(card.실적조건)} 필요)</span>`;

  const secondHtml = second && second.score > 0
    ? `<div class="rec-second">2순위: <strong>${second.card.name}</strong> · ${fmtPct(second.score)}</div>`
    : '';

  el.innerHTML = `
    <div class="rec-label">👑 추천 카드</div>
    <div class="rec-card-name" style="color:${card.color}">${card.name}</div>
    <div class="rec-benefit">${benefitText}</div>
    ${limitHtml}
    <div class="rec-status">${perfHtml}</div>
    ${secondHtml}
  `;
}

function buildBenefitRows(card) {
  const catMap = Object.fromEntries(CATEGORIES.map(c => [c.id, c.emoji]));
  const rows = Object.entries(card.혜택).map(([catId, b]) => {
    let valText = '';
    if (b.type === '할인')       valText = `${fmtPct(b.rate)} 할인`;
    else if (b.type === '적립')  valText = `${fmtPct(b.rate)} 적립`;
    else if (b.type === '정액할인') valText = `${fmtWon(b.amount)} 할인`;
    const limitText = b.월한도 ? `월 최대 ${fmtWon(b.월한도)}` : '';
    const noteText  = b.비고 || '';
    const used = getBenefitUsed(card.id, catId);
    const exhausted = b.월한도 && used >= b.월한도;
    return `
      <div class="benefit-row">
        <span class="benefit-cat">${catMap[catId] || '💳'} ${catId}</span>
        <div class="benefit-right">
          <div class="benefit-val" style="${exhausted ? 'text-decoration:line-through;color:var(--text2)' : ''}">${valText}</div>
          ${limitText ? `<div class="benefit-limit">${exhausted ? '⚠ 한도 소진' : limitText}</div>` : ''}
          ${noteText  ? `<div class="benefit-note">${noteText}</div>` : ''}
        </div>
      </div>`;
  });

  if (card.기본rate > 0 && Object.keys(card.혜택).length > 0) {
    rows.push(`
      <div class="benefit-row">
        <span class="benefit-cat">💳 그 외 전 가맹점</span>
        <div class="benefit-right"><div class="benefit-val">${fmtPct(card.기본rate)} 적립</div></div>
      </div>`);
  }

  if (rows.length === 0) {
    rows.push(`<div style="font-size:12px;color:var(--text2);padding:6px 0">혜택 정보 미입력</div>`);
  }

  return rows.join('');
}

function renderProgress() {
  // ── 전월 실적: 달성/미달성 뱃지만 표시 ──
  const prevRows = CARDS.map(card => {
    const lastMonth = state.지난달실적[card.id] || 0;
    const target    = card.실적조건;
    if (target === 0) {
      return `<div class="perf-row">
        <span class="perf-name" style="color:${card.color}">${card.shortName}</span>
        <span class="perf-badge perf-neutral">실적 조건 없음</span>
      </div>`;
    }
    const done = lastMonth >= target;
    return `<div class="perf-row">
      <span class="perf-name" style="color:${card.color}">${card.shortName}</span>
      <span class="perf-badge ${done ? 'perf-ok' : 'perf-fail'}">
        ${done ? `✓ 달성 · ${fmtWon(lastMonth)}` : `✗ 미달성 · ${fmtWon(lastMonth)} / ${fmtWon(target)}`}
      </span>
    </div>`;
  }).join('');

  // ── 이번달 실적: 진행 바 + 다음달 혜택까지 얼마 남았는지 ──
  const thisMonthRows = CARDS.map(card => {
    const thisMonth = getThisMonthSpend(card.id);
    const target    = card.실적조건;

    const benefitSection = `
      <div class="cp-benefits" id="benefits_${card.id}">
        ${buildBenefitRows(card)}
        ${card.메모 ? `<div class="cp-memo">${card.메모}</div>` : ''}
      </div>`;

    if (target === 0) {
      return `
        <div class="card-progress" onclick="toggleBenefits('${card.id}')">
          <div class="cp-header">
            <span class="cp-name" style="color:${card.color}">${card.name}</span>
            <span style="display:flex;gap:8px;align-items:center">
              <span class="cp-amount">이번달 ${fmtWon(thisMonth)}</span>
              <span class="cp-chevron" id="chevron_${card.id}">▾</span>
            </span>
          </div>
          <div class="cp-this-month">실적 조건 없음 · 혜택 항상 적용</div>
          ${benefitSection}
        </div>`;
    }

    const pct      = Math.min(100, Math.round((thisMonth / target) * 100));
    const done     = thisMonth >= target;
    const remain   = target - thisMonth;
    const cls      = done ? 'bar-done' : pct >= 70 ? 'bar-near' : 'bar-low';
    const pctColor = done ? 'var(--success)' : pct >= 70 ? 'var(--warning)' : 'var(--accent)';

    return `
      <div class="card-progress" onclick="toggleBenefits('${card.id}')">
        <div class="cp-header">
          <span class="cp-name" style="color:${card.color}">${card.name}</span>
          <span style="display:flex;gap:8px;align-items:center">
            <span class="cp-amount">이번달 ${fmtWon(thisMonth)} / ${fmtWon(target)}</span>
            <span class="cp-chevron" id="chevron_${card.id}">▾</span>
          </span>
        </div>
        <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="cp-footer">
          <span class="cp-pct" style="color:${pctColor}">${done ? '✓ 달성!' : pct + '%'}</span>
          <span class="cp-remain">${done ? '다음달 혜택 적용 예정 🎉' : '다음달 혜택까지 ' + fmtWon(remain) + ' 남음'}</span>
        </div>
        ${benefitSection}
      </div>`;
  }).join('');

  document.getElementById('progressBars').innerHTML = `
    <div class="subsection-title">전월 실적</div>
    <div class="prev-perf-list">${prevRows}</div>
    <div class="subsection-title" style="margin-top:14px">이번달 실적 (다음달 혜택용)</div>
    ${thisMonthRows}
  `;
}

  document.getElementById('chevron_'  + cardId)?.classList.toggle('open');

// ================================================================
// Ledger (가계부)
// ================================================================
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed
let calSelected = null;

function calMove(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  calSelected = null;
  renderLedger();
}

function renderLedger() {
  const today = new Date();
  const txns = state.이번달사용;

  // Group by date string
  const byDate = {};
  txns.forEach(t => {
    const d = t.date; // "YYYY-MM-DD"
    if (!d) return;
    const [y, m] = d.split('-').map(Number);
    if (y === calYear && m === calMonth + 1) {
      if (!byDate[d]) byDate[d] = [];
      byDate[d].push(t);
    }
  });

  const monthTotal = Object.values(byDate).flat().reduce((s, t) => s + (t.amount || 0), 0);

  document.getElementById('calTitle').textContent =
    `${calYear}년 ${calMonth + 1}월`;
  document.getElementById('calTotal').textContent = fmtWon(monthTotal);

  // Calendar grid
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const firstDow = new Date(calYear, calMonth, 1).getDay(); // 0=Sun

  const dows = ['일','월','화','수','목','금','토'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before 1st
  for (let i = 0; i < firstDow; i++) html += `<div></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayTxns = byDate[dateStr] || [];
    const dayTotal = dayTxns.reduce((s, t) => s + (t.amount || 0), 0);
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === day;
    const isSel = calSelected === dateStr;
    const hasTxn = dayTxns.length > 0;

    html += `<div class="cal-day${hasTxn ? ' has-txn' : ''}${isToday ? ' today' : ''}${isSel ? ' selected' : ''}"
      onclick="selectDay('${dateStr}')">
      <div class="day-num">${day}</div>
      ${hasTxn ? `<div class="day-amt">${fmtWon(dayTotal).replace('원','')}</div>` : ''}
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  renderCalDetail();
}

function selectDay(dateStr) {
  calSelected = calSelected === dateStr ? null : dateStr;
  renderLedger();
}

function renderCalDetail() {
  const detail = document.getElementById('calDetail');
  if (!calSelected) { detail.classList.remove('open'); return; }

  const txns = state.이번달사용.filter(t => t.date === calSelected);
  if (!txns.length) { detail.classList.remove('open'); return; }

  const [, m, d] = calSelected.split('-');
  document.getElementById('calDetailTitle').textContent = `${+m}월 ${+d}일 지출 내역`;

  const total = txns.reduce((s, t) => s + (t.amount || 0), 0);
  document.getElementById('calDetailList').innerHTML =
    txns.map(t => {
      const card = CARDS.find(c => c.id === t.cardId);
      return `<div class="cal-txn-row">
        <div>
          <div>${t.memo || t.category}</div>
          <div class="cal-txn-left">${card ? card.shortName : t.cardId} · ${t.category}</div>
        </div>
        <div class="cal-txn-right">${fmtWon(t.amount)}</div>
      </div>`;
    }).join('') +
    `<div class="cal-txn-row" style="margin-top:4px">
      <div style="font-weight:600">합계</div>
      <div class="cal-txn-right" style="color:var(--accent)">${fmtWon(total)}</div>
    </div>`;

  detail.classList.add('open');
}

// ================================================================
// Modal: Add Transaction
// ================================================================
let modalCat = null;
let modalCard = null;

function openAddModal() {
  modalCat = selectedCat;
  modalCard = null;

  document.getElementById('modalCatGrid').innerHTML = CATEGORIES.map(c => `
    <div class="sel-btn ${modalCat === c.id ? 'active' : ''}" onclick="pickCat('${c.id}')">
      ${c.emoji}<br>${c.label}
    </div>`).join('');

  document.getElementById('modalCardGrid').innerHTML = CARDS.map(c => `
    <div class="sel-btn" id="mc_${c.id}" onclick="pickCard('${c.id}')">${c.shortName}</div>`).join('');

  document.getElementById('inputAmount').value = '';
  openOverlay('addModal');
  setTimeout(() => document.getElementById('inputAmount').focus(), 200);
}

function pickCat(catId) {
  modalCat = catId;
  document.querySelectorAll('#modalCatGrid .sel-btn').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function pickCard(cardId) {
  modalCard = cardId;
  document.querySelectorAll('#modalCardGrid .sel-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('mc_' + cardId).classList.add('active');
}

function saveTransaction() {
  const amount = parseInt(document.getElementById('inputAmount').value);
  if (!amount || amount <= 0) return alert('금액을 입력해주세요.');
  if (!modalCard) return alert('카드를 선택해주세요.');
  if (!modalCat) return alert('카테고리를 선택해주세요.');

  state.이번달사용.push({
    date: new Date().toISOString().split('T')[0],
    cardId: modalCard,
    amount,
    category: modalCat,
  });

  // 혜택 한도 트래킹
  const card = CARDS.find(c => c.id === modalCard);
  const b = card?.혜택[modalCat];
  if (b && b.월한도) {
    const key = `${modalCard}_${modalCat}`;
    const used = state.이번달혜택사용[key] || 0;
    let gained = 0;
    if (b.type === '할인' || b.type === '적립') gained = Math.round(amount * b.rate);
    else if (b.type === '정액할인') gained = b.amount;
    state.이번달혜택사용[key] = Math.min(b.월한도, used + gained);
  }

  saveState();
  closeOverlay('addModal');
  renderAll();
}

// ================================================================
// Modal: History
// ================================================================
function openHistory() {
  const list = document.getElementById('historyList');
  const txs = [...state.이번달사용].reverse();

  if (txs.length === 0) {
    list.innerHTML = '<div class="history-empty">거래 내역이 없습니다.</div>';
  } else {
    const catMap = Object.fromEntries(CATEGORIES.map(c => [c.id, c.emoji]));
    const cardMap = Object.fromEntries(CARDS.map(c => [c.id, c.shortName]));
    list.innerHTML = txs.map((t, i) => `
      <div class="history-item">
        <div class="history-item-left">
          ${catMap[t.category] || '💳'} ${t.category} · ${cardMap[t.cardId] || t.cardId}
          <div style="font-size:11px;color:var(--text2);margin-top:2px">${t.date}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="history-item-right">${fmtWon(t.amount)}</div>
          <button onclick="deleteTransaction(${txs.length - 1 - i})" style="background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:2px">×</button>
        </div>
      </div>`).join('');
  }

  openOverlay('historyModal');
}

function deleteTransaction(idx) {
  if (!confirm('이 거래를 삭제할까요?')) return;
  state.이번달사용.splice(idx, 1);
  saveState();
  openHistory();
  renderAll();
}

// ================================================================
// Modal: Settings
// ================================================================
function openSettings() {
  // Manual perf input
  document.getElementById('manualPerfGrid').innerHTML = CARDS
    .filter(c => c.실적조건 > 0)
    .map(c => `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:12px;color:${c.color};flex:1;font-weight:600">${c.shortName}</span>
        <input type="number" id="perf_${c.id}" value="${state.지난달실적[c.id] || 0}"
          style="width:110px;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;outline:none"
          inputmode="numeric">
        <span style="font-size:11px;color:var(--text2)">원</span>
      </div>`).join('');

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.style.width = '100%';
  saveBtn.textContent = '실적 저장';
  saveBtn.onclick = saveManualPerf;

  const grid = document.getElementById('manualPerfGrid');
  const existing = grid.querySelector('.save-perf-btn');
  if (existing) existing.remove();
  const wrapper = document.createElement('div');
  wrapper.className = 'save-perf-btn';
  wrapper.style.marginTop = '8px';
  wrapper.appendChild(saveBtn);
  grid.appendChild(wrapper);

  openOverlay('settingsModal');
}

function saveManualPerf() {
  CARDS.filter(c => c.실적조건 > 0).forEach(c => {
    const el = document.getElementById('perf_' + c.id);
    if (el) state.지난달실적[c.id] = parseInt(el.value) || 0;
  });
  saveState();
  renderAll();
  alert('전월 실적이 저장됐습니다!');
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(data).then(() => alert('클립보드에 복사됐습니다!'));
  } else {
    document.getElementById('importInput').value = data;
    alert('아래 텍스트 영역에 데이터가 표시됩니다. 복사해 백업하세요.');
  }
}

function importData() {
  try {
    const parsed = JSON.parse(document.getElementById('importInput').value);
    if (parsed.이번달사용)    state.이번달사용    = parsed.이번달사용;
    if (parsed.지난달실적)    state.지난달실적    = parsed.지난달실적;
    if (parsed.이번달혜택사용) state.이번달혜택사용 = parsed.이번달혜택사용;
    saveState();
    closeOverlay('settingsModal');
    renderAll();
    alert('가져오기 완료!');
  } catch(e) {
    alert('JSON 형식이 올바르지 않습니다.');
  }
}

function resetMonth() {
  if (!confirm('이번달 사용내역을 지난달 실적으로 확정하고 초기화할까요?\n(되돌릴 수 없습니다)')) return;
  CARDS.forEach(c => { state.지난달실적[c.id] = getThisMonthSpend(c.id); });
  state.이번달사용 = [];
  state.이번달혜택사용 = {};
  saveState();
  closeOverlay('settingsModal');
  renderAll();
  alert('초기화 완료! 지난달 실적이 업데이트됐습니다.');
}

// ================================================================
// Overlay helpers
// ================================================================
function openOverlay(id) {
  document.getElementById(id).classList.add('open');
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ================================================================
// Init
// ================================================================
function updateMonthBadge() {
  const now = new Date();
  document.getElementById('monthBadge').textContent = `${now.getMonth() + 1}월`;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ================================================================
// Auth (7-day session)
// ================================================================
const AUTH_KEY  = 'cardBiseo_auth';
const AUTH_PASS = '080711';
const AUTH_TTL  = 7 * 24 * 60 * 60 * 1000;

function checkAuth() {
  try {
    const exp = parseInt(localStorage.getItem(AUTH_KEY) || '0', 10);
    if (Date.now() < exp) return true;
  } catch(e) {}
  return false;
}

function tryUnlock() {
  const val = document.getElementById('lockInput').value;
  if (val === AUTH_PASS) {
    localStorage.setItem(AUTH_KEY, Date.now() + AUTH_TTL);
    document.getElementById('lockScreen').classList.remove('active');
    document.getElementById('lockInput').value = '';
    document.getElementById('lockError').textContent = '';
  } else {
    const err = document.getElementById('lockError');
    err.textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
    setTimeout(() => { err.textContent = ''; }, 2000);
  }
}

if (!checkAuth()) {
  document.getElementById('lockScreen').classList.add('active');
  setTimeout(() => document.getElementById('lockInput').focus(), 100);
}

loadState();
updateMonthBadge();
renderAll();

// data.json (Claude가 Telegram 파싱 후 푸시하는 파일) 자동 로드
fetch('./data.json?t=' + Date.now())
  .then(r => r.ok ? r.json() : null)
  .then(remote => {
    if (!remote) return;
    // 원격 트랜잭션과 로컬 트랜잭션을 합치되 중복 제거
    const localIds = new Set(state.이번달사용.map(t => `${t.date}_${t.cardId}_${t.amount}_${t.category}`));
    const newTxs = (remote.이번달사용 || []).filter(t =>
      !localIds.has(`${t.date}_${t.cardId}_${t.amount}_${t.category}`)
    );
    if (newTxs.length > 0) {
      state.이번달사용 = [...state.이번달사용, ...newTxs];
    }
    // 지난달 실적은 원격값이 있으면 덮어쓰기
    if (remote.지난달실적) {
      Object.assign(state.지난달실적, remote.지난달실적);
    }
    if (newTxs.length > 0 || remote.지난달실적) {
      saveState();
      renderAll();
    }
  })
  .catch(() => {});
</script>
